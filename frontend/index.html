<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DevOps Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f3f4f6; color: #111827; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        button { padding: 10px 15px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #4338ca; }
        input { padding: 10px; margin-right: 10px; border: 1px solid #d1d5db; border-radius: 4px; width: 60%; }
        pre { background: #f8fafc; padding: 15px; border-radius: 5px; border: 1px solid #e2e8f0; }
        #user-msg { color: #059669; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #4f46e5;">DevOps Mini Project</h1>
        <div class="card">
            <h2>👤 Thông tin sinh viên</h2>
            <button onclick="getAbout()">Xem /about</button>
            <pre id="about-info"></pre>
        </div>
        <div class="card">
            <h2>💾 Thêm sinh viên </h2>
            <input type="text" id="username" placeholder="Nhập tên người dùng...">
            <button onclick="addUser()">Thêm User</button>
            <p id="user-msg"></p>
        </div>
    </div>

    <script>
        async function getAbout() {
            const res = await fetch('http://localhost:5000/about');
            const data = await res.json();
            document.getElementById('about-info').textContent = JSON.stringify(data, null, 2);
        }
        async function addUser() {
            const name = document.getElementById('username').value;
            if(!name) return;
            const res = await fetch('http://localhost:5000/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            document.getElementById('user-msg').textContent = "✅ " + data.message;
            document.getElementById('username').value = "";
        }
    </script>
</body>
</html>
